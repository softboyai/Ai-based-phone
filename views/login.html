<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KT Phones</title>
    <!-- Google Fonts - Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="login">

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <h1>KT <span>Phones</span></h1>
        </div>
        <button class="menu-toggle">☰</button>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/recommend">Get Recommendation</a>
            <a href="/login" id="nav-login" class="active">Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="form-container">
            <h2>Welcome Back</h2>
            
            <!-- Message Area -->
            <div id="message" class="alert" style="display:none;"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
            </form>

            <!-- Link to Register -->
            <p class="form-link">
                <a href="/forgot-password" style="color:#c62828;">Forgot Password?</a>
            </p>
            <p class="form-link">
                Don't have an account? <a href="/register">Register here</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 KT Phones - AI-Based Mobile Phone Recommendation System</p>
    </footer>

    <!-- Main JavaScript -->
    <script src="/js/main.js"></script>
</body>
</html>
